name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn --batch-mode test

      - name: Build JAR (skip tests, already ran)
        run: mvn --batch-mode package -DskipTests

      - name: Create tgz artifact
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          ARCHIVE_NAME="${ARTIFACT_ID}-${VERSION}"
          mkdir -p dist
          cp target/${ARTIFACT_ID}-${VERSION}.jar dist/
          cp LICENSE.txt NOTICE.txt README.md dist/ 2>/dev/null || true
          tar -czf "${ARCHIVE_NAME}.tgz" -C dist .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Upload tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.tgz
          retention-days: 1
